name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing vX.Y.Z tag to release'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release ref
        id: release_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            REF="refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
            REF="${GITHUB_REF}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: npm run --silent release:check-version -- ${{ steps.release_ref.outputs.tag }}

      - name: Verify release build
        run: npm run release:verify

      - name: Pack npm artifact
        id: pack
        run: |
          TARBALL="$(npm run --silent release:pack)"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "${{ steps.pack.outputs.tarball }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release_ref.outputs.tag }}" "${{ steps.pack.outputs.tarball }}" \
            --verify-tag \
            --generate-notes \
            --title "${{ steps.release_ref.outputs.tag }}"
